name: UI Tests (Selenium + TestNG) + Allure Pages

on:
  push:
    branches: [ "main" ]
  pull_request:

permissions:
  contents: write

jobs:
  test-and-publish:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Java
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '22'
          cache: 'maven'

      - name: Run tests
        continue-on-error: true
        run: mvn -q test -Dheadless=true

      - name: Generate Allure report (Maven)
        if: always()
        run: mvn -q -DskipTests=true allure:report

      - name: Rename Allure entry file to index.html
        if: always()
        run: |
          cp target/site/allure-maven-plugin/allure-maven.html \
             target/site/allure-maven-plugin/index.html

      - name: Publish to GitHub Pages (gh-pages)
        uses: peaceiris/actions-gh-pages@v4
        if: always()
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_branch: gh-pages
          publish_dir: target/site/allure-maven-plugin
