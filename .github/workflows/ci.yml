name: Publish Test Report (Allure → Pages)

on:
  push:
    branches: [ "main" ]
  workflow_dispatch:
    inputs:
      debug_flow:
        description: "Enable flow debug logs (-DdebugFlow=true)"
        required: false
        default: "false"

permissions:
  contents: write

jobs:
  test-and-publish:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Checkout gh-pages history (for Allure trends)
        if: always()
        uses: actions/checkout@v4
        with:
          ref: gh-pages
          path: gh-pages-history
        continue-on-error: true

      - name: Set up Java
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '22'
          cache: 'maven'

      - name: Run tests
        env:
          DEBUG_FLOW: ${{ github.event_name == 'workflow_dispatch' && github.event.inputs.debug_flow || 'false' }}
        run: |
          rm -rf allure-results target/allure-results target/allure-report target/site/allure-maven-plugin
          mvn -q test -Dheadless=true -DdebugFlow=${DEBUG_FLOW} -Dallure.results.directory=target/allure-results

      - name: Generate Allure report
        if: always()
        shell: bash
        run: |
          # Restore previous history/trends from gh-pages into new run results.
          mkdir -p target/allure-results/history
          if [ -d "gh-pages-history/allure-history/history" ] && [ "$(ls -A gh-pages-history/allure-history/history)" ]; then
            cp -r gh-pages-history/allure-history/history/* target/allure-results/history/ || true
          elif [ -d "gh-pages-history/history" ] && [ "$(ls -A gh-pages-history/history)" ]; then
            cp -r gh-pages-history/history/* target/allure-results/history/ || true
          fi

          echo "Restored history files:"
          ls -la target/allure-results/history || true

          mvn -q -DskipTests=true allure:report

          REPORT_HISTORY=""
          if [ -d "target/site/allure-maven-plugin/history" ]; then
            REPORT_HISTORY="target/site/allure-maven-plugin/history"
          elif [ -d "target/allure-report/history" ]; then
            REPORT_HISTORY="target/allure-report/history"
          fi

          mkdir -p gh-pages-history/allure-history/history
          if [ -n "$REPORT_HISTORY" ]; then
            cp -r "$REPORT_HISTORY"/* gh-pages-history/allure-history/history/ || true
          fi

          echo "Generated report history:"
          ls -la target/site/allure-maven-plugin/history || true
          echo "Pages history folder:"
          ls -la gh-pages-history/allure-history/history || true

          mkdir -p target/allure-report

          if [ -d "target/site/allure-maven-plugin" ] && [ "$(ls -A target/site/allure-maven-plugin)" ]; then
            cp -r target/site/allure-maven-plugin/* target/allure-report/
          else
            echo "Allure output folder is empty or missing."
          fi

          if [ -f "target/allure-report/allure-maven.html" ] && [ ! -f "target/allure-report/index.html" ]; then
            cp target/allure-report/allure-maven.html target/allure-report/index.html
          fi

          if [ ! -f "target/allure-report/index.html" ]; then
            printf '%s\n' '<html><body><h1>No Allure report generated</h1><p>Check the workflow logs for test/report errors.</p></body></html>' > target/allure-report/index.html
          fi

          # Ensure published site contains history path and compatibility copy.
          if [ -d "gh-pages-history/allure-history/history" ] && [ "$(ls -A gh-pages-history/allure-history/history)" ]; then
            mkdir -p target/allure-report/allure-history/history
            cp -r gh-pages-history/allure-history/history/* target/allure-report/allure-history/history/ || true
            mkdir -p target/allure-report/history
            cp -r gh-pages-history/allure-history/history/* target/allure-report/history/ || true
          fi

          echo "Publish directory content:"
          ls -la target/allure-report

      - name: Publish to GitHub Pages (gh-pages)
        uses: peaceiris/actions-gh-pages@v4
        if: always()
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_branch: gh-pages
          publish_dir: gh-pages-history
