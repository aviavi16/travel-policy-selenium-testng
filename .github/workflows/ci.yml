name: UI Tests (Selenium + TestNG) + Allure Pages

on:
  push:
    branches: [ "main" ]
  pull_request:

permissions:
  contents: write

jobs:
  test-and-publish:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Java
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '22'
          cache: 'maven'

      - name: Run tests
        continue-on-error: true
        run: mvn -q test -Dheadless=true

      - name: Generate Allure report
        if: always()
        shell: bash
        run: |
          # Allure TestNG writes results to ./allure-results by default,
          # while allure-maven expects target/allure-results.
          if [ -d "allure-results" ] && [ "$(ls -A allure-results)" ]; then
            mkdir -p target/allure-results
            cp -r allure-results/* target/allure-results/
          fi

          mvn -q -DskipTests=true allure:report

          mkdir -p target/allure-report

          if [ -d "target/site/allure-maven-plugin" ] && [ "$(ls -A target/site/allure-maven-plugin)" ]; then
            cp -r target/site/allure-maven-plugin/* target/allure-report/
          else
            echo "Allure output folder is empty or missing."
          fi

          if [ -f "target/allure-report/allure-maven.html" ] && [ ! -f "target/allure-report/index.html" ]; then
            cp target/allure-report/allure-maven.html target/allure-report/index.html
          fi

          if [ ! -f "target/allure-report/index.html" ]; then
            cat > target/allure-report/index.html <<'HTML'
            <html><body><h1>No Allure report generated</h1><p>Check the workflow logs for test/report errors.</p></body></html>
            HTML
          fi

          echo "Publish directory content:"
          ls -la target/allure-report

      - name: Publish to GitHub Pages (gh-pages)
        uses: peaceiris/actions-gh-pages@v4
        if: always()
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_branch: gh-pages
          publish_dir: target/allure-report
